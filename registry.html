<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NARA — AgentRegistry Explorer</title>
<meta name="description" content="Explore sovereign agent identities on the Nara network. Verify reputation, boundaries, and history — all on-chain.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0c; --surface:#111; --surface2:#161616;
  --border:#1e1e1e; --text:#e8e8e8; --muted:#888; --dim:#222;
  --accent:#39ff14; --adim:rgba(57,255,20,0.06); --aborder:rgba(57,255,20,0.18);
  --sm:13px; --md:15px; --lg:19px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'JetBrains Mono','Cascadia Code','Fira Code','Consolas','Courier New',monospace;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(57,255,20,0.008) 2px,rgba(57,255,20,0.008) 4px);pointer-events:none;z-index:9999;}

/* Nav */
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(12,12,12,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 48px;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;text-decoration:none;gap:8px;}
.nav-logo span{font-size:13px;font-weight:800;letter-spacing:0.3em;color:var(--text);}
.nav-back{font-size:var(--sm);color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 16px;transition:all 0.2s;}
.nav-back:hover{color:var(--accent);border-color:var(--aborder);}

/* Layout */
.container{max-width:1100px;margin:0 auto;padding:96px 48px 80px;}

/* Search */
.search-wrap{margin-bottom:48px;}
.search-label{font-size:10px;color:var(--accent);opacity:0.5;letter-spacing:0.2em;margin-bottom:16px;}
.search-box{display:flex;gap:0;}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-right:none;color:var(--text);font-family:inherit;font-size:var(--sm);padding:14px 20px;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--aborder);}
.search-input::placeholder{color:var(--muted);opacity:0.4;}
.search-btn{background:var(--adim);border:1px solid var(--aborder);color:var(--accent);font-family:inherit;font-size:12px;padding:14px 24px;cursor:pointer;letter-spacing:0.12em;font-weight:700;transition:all 0.2s;}
.search-btn:hover{background:rgba(57,255,20,0.12);}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-bottom:48px;}
.stat{background:var(--surface);padding:24px 20px;}
.stat-label{font-size:9px;color:var(--accent);opacity:0.5;letter-spacing:0.15em;margin-bottom:8px;}
.stat-val{font-size:clamp(20px,2.5vw,28px);font-weight:800;color:var(--text);}
.stat-val .accent{color:var(--accent);}

/* Agent list */
.agent-list{display:flex;flex-direction:column;gap:1px;background:var(--border);}
.agent-row{background:var(--surface);padding:24px 28px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;cursor:pointer;transition:background 0.2s;position:relative;}
.agent-row:hover{background:var(--surface2);}
.agent-row:hover::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);}
.agent-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;}
.agent-addr{font-size:10px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.agent-addr .zk{font-size:9px;color:var(--accent);border:1px solid var(--aborder);padding:1px 5px;letter-spacing:0.08em;}
.agent-caps{display:flex;gap:6px;flex-wrap:wrap;}
.agent-cap{font-size:10px;padding:3px 8px;border:1px solid var(--border);color:var(--accent);transition:border-color 0.2s;}
.agent-row:hover .agent-cap{border-color:var(--aborder);}
.agent-stats{display:flex;gap:20px;text-align:right;}
.agent-stat-item{display:flex;flex-direction:column;gap:2px;}
.agent-stat-label{font-size:9px;color:var(--muted);letter-spacing:0.1em;}
.agent-stat-val{font-size:14px;font-weight:700;color:var(--text);}
.agent-stat-val.green{color:var(--accent);}

/* Detail panel */
.detail-panel{display:none;background:var(--bg);border:1px solid var(--aborder);margin-top:-1px;padding:0;overflow:hidden;}
.detail-panel.open{display:block;}
.detail-section{padding:20px 28px;border-top:1px solid var(--border);}
.detail-section:first-child{border-top:none;}
.detail-label{font-size:9px;color:var(--accent);opacity:0.5;letter-spacing:0.15em;margin-bottom:8px;}
.detail-italic{font-size:var(--sm);color:var(--muted);font-style:italic;opacity:0.7;margin-bottom:10px;}
.detail-rules{display:flex;gap:24px;flex-wrap:wrap;font-size:var(--sm);}
.detail-rules span{color:var(--text);font-weight:700;}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.detail-grid-item span:first-child{font-size:10px;color:var(--muted);}
.detail-grid-item span:last-child{font-size:14px;font-weight:700;color:var(--text);display:block;margin-top:2px;}
.detail-grid-item span.green{color:var(--accent);}
.detail-log{font-size:11px;line-height:2;color:var(--muted);}
.detail-log .ok{color:var(--accent);}
.detail-log .fail{color:#ff5f57;}
.detail-peers{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.detail-peer{border:1px solid var(--border);padding:12px;transition:border-color 0.3s;}
.detail-peer:hover{border-color:var(--aborder);}
.zk-row{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:4px;}
.zk-check{color:var(--accent);}
.zk-block{color:var(--muted);letter-spacing:0.1em;background:var(--surface);padding:2px 6px;}

/* Devnet bar */
.devnet{margin-top:48px;padding:16px 20px;border:1px solid var(--aborder);background:var(--adim);display:flex;align-items:center;justify-content:space-between;}

/* Footer */
footer{border-top:1px solid var(--border);padding:40px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
footer a{color:var(--muted);text-decoration:none;font-size:var(--sm);transition:color 0.2s;}
footer a:hover{color:var(--accent);}

/* Mobile */
@media(max-width:700px){
  nav{padding:0 20px;}
  .container{padding:80px 20px 60px;}
  .stats-bar{grid-template-columns:1fr 1fr;}
  .agent-row{grid-template-columns:1fr;gap:16px;}
  .agent-stats{justify-content:flex-start;}
  .detail-grid{grid-template-columns:1fr 1fr;}
  .detail-peers{grid-template-columns:1fr;}
  .detail-rules{flex-direction:column;gap:8px;}
}
</style>
</head>

function renderAgents(list) {
  const container = document.getElementById('agent-list');
  container.innerHTML = '';
  list.forEach((a, i) => {
    // Row
    const row = document.createElement('div');
    row.className = 'agent-row';
    row.onclick = () => toggleDetail(i);
    row.innerHTML = `
      <div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-addr">
          <span style="letter-spacing:0.1em;background:var(--surface);padding:2px 6px;">████████████</span>
          <span class="zk">ZK-HIDDEN</span>
        </div>
        <div class="agent-caps">${a.caps.map(c => `<span class="agent-cap">${c}</span>`).join('')}</div>
      </div>
      <div class="agent-stats">
        <div class="agent-stat-item"><span class="agent-stat-label">CALLS</span><span class="agent-stat-val">${a.calls.toLocaleString()}</span></div>
        <div class="agent-stat-item"><span class="agent-stat-label">SUCCESS</span><span class="agent-stat-val green">${a.success}%</span></div>
        <div class="agent-stat-item"><span class="agent-stat-label">SETTLED</span><span class="agent-stat-val">${a.settled} NARA</span></div>
      </div>
    `;
    container.appendChild(row);

    // Detail panel
    const detail = document.createElement('div');
    detail.className = 'detail-panel';
    detail.id = `detail-${i}`;
    detail.innerHTML = `
      <div class="detail-section">
        <div class="detail-label">BOUNDARIES</div>
        <div class="detail-italic">Humans define limits. The chain enforces them forever.</div>
        <div class="detail-rules">
          <div style="color:var(--muted);">Max spend: <span>${a.boundaries.spend}</span></div>
          <div style="color:var(--muted);">Allowed: <span>${a.boundaries.allowed}</span></div>
          <div style="color:var(--muted);">Expires: <span>${a.boundaries.expires}</span></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-label">PRIVACY</div>
        <div class="detail-italic">Prove everything. Reveal nothing.</div>
        ${a.privacy.map(p => `<div class="zk-row"><span class="${p.ok ? 'zk-check' : ''}">${p.ok ? '✓' : '✗'}</span><span style="color:var(--muted);">ZK-verified:</span><span style="color:var(--text);font-weight:700;">${p.label}</span></div>`).join('')}
        <div class="zk-row" style="margin-top:4px;"><span style="color:var(--muted);opacity:0.4;">■</span><span style="color:var(--muted);">Real address:</span><span class="zk-block">████████</span></div>
      </div>
      <div class="detail-section">
        <div class="detail-label">HISTORY</div>
        <div class="detail-italic">Humans have courts. Agents have the chain.</div>
        <div class="detail-log">

      <div class="detail-section">

        <div class="detail-italic">Before agents transact, they verify each other.</div>
        <div class="detail-peers">

}

function toggleDetail(i) {
  const panel = document.getElementById(`detail-${i}`);
  const wasOpen = panel.classList.contains('open');
  // Close all
  document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('open'));
  if (!wasOpen) panel.classList.add('open');
}

function filterAgents() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { renderAgents(agents); return; }
  const filtered = agents.filter(a =>
    a.name.includes(q) || a.addr.includes(q) || a.caps.some(c => c.includes(q))
  );
  renderAgents(filtered);
}

document.getElementById('search-input').addEventListener('keyup', e => {
  if (e.key === 'Enter') filterAgents();
});

  totalCalls += Math.floor(Math.random() * 12) + 3;
  document.getElementById('total-agents').textContent = totalAgents.toLocaleString();
  document.getElementById('total-calls').textContent = (totalCalls / 1000000).toFixed(1) + 'M';
}, 3000);

renderAgents(agents);
</script>
